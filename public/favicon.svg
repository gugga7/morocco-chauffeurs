<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1A1A2E"/>
  <!-- 8-pointed star (zellige motif) -->
  <g transform="translate(32, 32)">
    <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" fill="#C9A96E"/>
    <rect x="-10" y="-10" width="20" height="20" transform="rotate(45)" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- MC monogram -->
  <text x="32" y="37" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1A1A2E" text-anchor="middle" dominant-baseline="middle">MC</text>
</svg>
