<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- MOROCCO text -->
  <text x="200" y="38" font-family="Georgia, 'Playfair Display', serif" font-size="36" font-weight="700" fill="#C9A96E" text-anchor="middle" letter-spacing="8">MOROCCO</text>

  <!-- Zellige-inspired 8-pointed star accent -->
  <g transform="translate(200, 58)">
    <polygon points="0,-6 1.7,-1.7 6,0 1.7,1.7 0,6 -1.7,1.7 -6,0 -1.7,-1.7" fill="#C9A96E" opacity="0.7"/>
    <rect x="-4.2" y="-4.2" width="8.4" height="8.4" transform="rotate(45)" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- CHAUFFEURS text -->
  <text x="200" y="82" font-family="Georgia, 'Playfair Display', serif" font-size="18" font-weight="400" fill="#C9A96E" text-anchor="middle" letter-spacing="12">CHAUFFEURS</text>

  <!-- Decorative lines flanking the star -->
  <line x1="120" y1="58" x2="188" y2="58" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>
  <line x1="212" y1="58" x2="280" y2="58" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>
</svg>
